<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>평가자 대시보드</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
  <div class="header-left">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="#3b82f6"/>
      <path d="M8 9h12M8 14h12M8 19h7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span class="header-title">평가자 대시보드</span>
    <nav class="header-nav">
      <a class="header-link" href="/">지원자</a>
      <a class="header-link active" href="/evaluations.html">평가자</a>
    </nav>
    <div class="auth-status" id="auth-status">
      <span class="auth-dot checking" aria-hidden="true"></span>
      <a class="auth-status-link" id="auth-status-text" href="/login.html">로그인</a>
    </div>
  </div>
  <div class="header-stats" id="header-stats"></div>
</header>

<div class="toolbar">
  <div class="tb-group">
    <span class="tb-label">공고</span>
    <select id="sel-rec" onchange="onRecChange()">
      <option value="">전체</option>
    </select>
  </div>

  <div class="tb-group">
    <span class="tb-label">트랙</span>
    <div class="pill-group" id="track-pills">
      <button class="pill active" onclick="setPill('track',this,'')">전체</button>
      <button class="pill p-ANALYSIS" onclick="setPill('track',this,'ANALYSIS')">분석</button>
      <button class="pill p-VISUALIZATION" onclick="setPill('track',this,'VISUALIZATION')">시각화</button>
      <button class="pill p-ENGINEERING" onclick="setPill('track',this,'ENGINEERING')">엔지니어링</button>
    </div>
  </div>

  <div class="tb-group">
    <span class="tb-label">개인 평가</span>
    <div class="pill-group" id="final-pills">
      <button class="pill active" onclick="setPill('final_decision',this,'')">전체</button>
      <button class="pill p-pending" onclick="setPill('final_decision',this,'pending')">미결</button>
      <button class="pill p-pass" onclick="setPill('final_decision',this,'pass')">합격</button>
      <button class="pill p-hold" onclick="setPill('final_decision',this,'hold')">보류</button>
      <button class="pill p-fail" onclick="setPill('final_decision',this,'fail')">불합격</button>
    </div>
  </div>

  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" id="search-input" placeholder="이름, 이메일, 대학교, 전공 검색..." oninput="onSearch()">
  </div>

  <div class="sort-wrap">
    <span class="tb-label">정렬</span>
    <select id="sel-sort" onchange="onSortChange()">
      <option value="total_score|desc">총점 높은순</option>
      <option value="total_score|asc">총점 낮은순</option>
      <option value="pass_count|desc">합격 개수순</option>
      <option value="hold_count|desc">보류 개수순</option>
      <option value="name|asc">이름 오름차순</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="table-meta">
    <div class="table-meta-text">
      <span class="table-count" id="tbl-count">불러오는 중...</span>
      <span class="table-hint">지원자를 클릭하면 지원서, 개인 평가, 평가 현황을 볼 수 있습니다.</span>
    </div>
    <button class="panel-refresh" onclick="refreshEvaluationDashboard()" title="새로고침" type="button">새로고침</button>
  </div>
  <div class="table-wrap eval-table-wrap">
    <table>
      <thead>
        <tr>
          <th>지원자</th>
          <th>부문</th>
          <th>학교 / 전공</th>
          <th>학기</th>
          <th>졸업 예정</th>
          <th>합격</th>
          <th>보류</th>
          <th>불합</th>
          <th>총점</th>
          <th>개인 평가</th>
          <th>최종 평가</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="11" class="loading-cell">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel eval-panel" id="panel">
  <div class="panel-hdr">
    <div class="panel-hdr-left">
      <span class="panel-name" id="p-name">-</span>
      <span class="badge" id="p-track"></span>
    </div>
    <div class="panel-hdr-actions">
      <button class="panel-refresh" id="panel-refresh" onclick="refreshEvaluationDashboard()" title="새로고침" type="button">새로고침</button>
      <button class="panel-close" onclick="closePanel()" title="닫기">X</button>
    </div>
  </div>
  <div class="panel-tabs">
    <button class="panel-tab active" id="pt-app" onclick="switchTab('app')">지원서</button>
    <button class="panel-tab" id="pt-final" onclick="switchTab('final')">개인 평가</button>
    <button class="panel-tab" id="pt-status" onclick="switchTab('status')">평가 현황</button>
    <button class="panel-tab" id="pt-interview" onclick="switchTab('interview')">면접 질문</button>
    <div class="panel-tab-actions">
      <button class="panel-nav-btn" onclick="moveApplicant(-1)" title="이전 지원자">이전</button>
      <button class="panel-nav-btn" onclick="moveApplicant(1)" title="다음 지원자">다음</button>
    </div>
  </div>
  <div class="panel-body" id="panel-body">
    <div class="loading-cell">불러오는 중...</div>
  </div>
</div>

<script>
const S = {
  filters: { recruitment_id:'', track:'', final_decision:'', search:'', sort:'total_score', order:'desc' },
  rows: [],
  currentId: null,
  currentData: null,
  tab: 'app',
  finalDraft: { decision:'pending', score:null, memo:'', interview_question:'' },
};

const TRACK_LABEL = { ANALYSIS:'분석', VISUALIZATION:'시각화', ENGINEERING:'엔지니어링' };
const DEC_LABEL = { pending:'미결', pass:'합격', fail:'불합격', hold:'보류' };

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}
function trackBadge(t) {
  const cls = ['ANALYSIS','VISUALIZATION','ENGINEERING'].includes(t) ? t : '기타';
  return `<span class="badge track-${cls}">${esc(TRACK_LABEL[t] || t || '-')}</span>`;
}
function decBadge(decision) {
  const d = decision || 'pending';
  return `<span class="badge d-${d}">${DEC_LABEL[d] || d}</span>`;
}
function tryParseJson(value) {
  if (typeof value !== 'string') return value;
  const trimmed = value.trim();
  if (!trimmed || !/^[\[{]/.test(trimmed)) return value;
  try { return JSON.parse(trimmed); } catch (_) { return value; }
}
function isUrl(value) {
  return /^https?:\/\/\S+$/i.test(String(value || '').trim());
}
function linkifyText(value) {
  const text = String(value ?? '');
  const urlPattern = /(https?:\/\/[^\s<]+)/g;
  let lastIndex = 0;
  let html = '';

  text.replace(urlPattern, (url, _match, offset) => {
    html += esc(text.slice(lastIndex, offset));
    html += `<a class="answer-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`;
    lastIndex = offset + url.length;
    return url;
  });

  html += esc(text.slice(lastIndex));
  return html || '답변 없음';
}
function formatAnswerKey(key) {
  const labels = {
    date: '날짜',
    day: '요일',
    time: '시간',
    start: '시작',
    end: '종료',
    available: '가능 여부',
    memo: '메모'
  };
  return labels[key] || String(key).replace(/_/g, ' ');
}
function renderNestedAnswerValue(value) {
  if (Array.isArray(value)) {
    if (!value.length) return '<em>-</em>';
    return `<div class="answer-chip-row">${value.map(item => `<span>${esc(typeof item === 'object' && item !== null ? JSON.stringify(item) : item)}</span>`).join('')}</div>`;
  }
  if (value && typeof value === 'object') {
    const entries = Object.entries(value);
    if (!entries.length) return '<em>-</em>';
    return `<div class="answer-mini-grid">${entries.map(([key, val]) => `<div><span>${esc(formatAnswerKey(key))}</span><strong>${esc(Array.isArray(val) ? val.join(', ') : val ?? '-')}</strong></div>`).join('')}</div>`;
  }
  return esc(value ?? '-');
}
function renderObjectAnswer(value) {
  const entries = Object.entries(value || {});
  if (!entries.length) return '<div class="answer-text muted">답변 없음</div>';

  return `<div class="answer-json-grid">${entries.map(([key, val]) =>
    `<div class="answer-json-row"><span>${esc(formatAnswerKey(key))}</span><strong>${renderNestedAnswerValue(val)}</strong></div>`
  ).join('')}</div>`;
}
function renderArrayAnswer(items) {
  if (!items.length) return '<div class="answer-text muted">답변 없음</div>';

  if (items.every(item => typeof item === 'object' && item !== null && !Array.isArray(item))) {
    return `<div class="answer-time-grid">${items.map(item => {
      const primary = item.date || item.day || item.time || item.label || item.name || '-';
      const secondary = [item.start, item.end].filter(Boolean).join(' - ') || item.value || item.available || item.memo || '';
      return `<div class="answer-time-card"><span>${esc(primary)}</span><strong>${esc(secondary || '-')}</strong></div>`;
    }).join('')}</div>`;
  }

  return `<div class="answer-list">${items.map(item => `<div>${esc(typeof item === 'object' ? JSON.stringify(item) : item)}</div>`).join('')}</div>`;
}
function renderAnswerValue(rawAnswer) {
  const answer = tryParseJson(rawAnswer);

  if (Array.isArray(answer)) return renderArrayAnswer(answer);
  if (answer && typeof answer === 'object') return renderObjectAnswer(answer);
  if (isUrl(answer)) {
    const url = String(answer).trim();
    return `<a class="answer-link-card" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`;
  }
  return `<div class="answer-text">${linkifyText(answer || '답변 없음')}</div>`;
}
const API_BASE_URL = 'https://dev.bigdataboaz.com';
function apiUrl(path) {
  return path.startsWith('http') ? path : API_BASE_URL + path;
}
function authHeaders(extra = {}) {
  const token = sessionStorage.getItem('access_token');
  return {
    ...extra,
    ...(token ? { Authorization: 'Bearer ' + token } : {})
  };
}
function unwrapApiResponse(result) {
  return result && Object.prototype.hasOwnProperty.call(result, 'data') ? result.data : result;
}
function toApiDecision(decision) {
  return String(decision || 'pending').toUpperCase();
}
function fromApiDecision(decision) {
  return String(decision || 'PENDING').toLowerCase();
}
function normalizeRecruitments(result) {
  return (unwrapApiResponse(result) || []).map(item => ({
    ...item,
    id: item.recruitment_id || item.id,
    label: item.term ? `${item.term}기` : `공고 #${item.recruitment_id || item.id}`
  })).filter(item => item.id);
}
function applicantListUrl(recruitmentId) {
  return '/api/v1/admin/recruitment/' + encodeURIComponent(recruitmentId) + '/applicants/evaluations';
}
async function request(url, options = {}) {
  const send = async () => {
    const response = await fetch(apiUrl(url), {
      credentials: 'include',
      ...options,
      headers: authHeaders(options.headers || {})
    });

    let result = null;
    try {
      result = await response.json();
    } catch (_) {}

    return { response, result };
  };

  let { response, result } = await send();

  if (response.status === 401) {
    const refreshedToken = await refreshAccessToken();
    if (refreshedToken) {
      ({ response, result } = await send());
    }
  }

  if (!response.ok) {
    throw new Error(result?.message || result?.error?.message || result?.error_code || `HTTP ${response.status}`);
  }

  return unwrapApiResponse(result);
}
function get(url) {
  return request(url, { method: 'GET' });
}
function put(url, data) {
  return request(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}
function patch(url, data) {
  return request(url, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}
async function loadMyEvaluation(applicantId) {
  const evaluation = await get('/api/v1/admin/recruitment/applicants/' + applicantId + '/evaluations/me');
  return evaluation ? { ...evaluation, decision: fromApiDecision(evaluation.decision) } : { decision:'pending', score:null, memo:'' };
}
async function loadEvaluatorEvaluations(applicantId) {
  const result = await get('/api/v1/admin/recruitment/applicants/' + applicantId + '/evaluations');
  return ((result && result.evaluations) || []).map(item => ({
    ...item,
    reviewer_name: item.name,
    decision: fromApiDecision(item.decision)
  }));
}
async function loadApplicantInterviewQuestions(applicantId) {
  const result = await get('/api/v1/admin/recruitment/applicants/' + applicantId + '/interview-questions');
  return ((result && result.interview_questions) || []).map(item => ({
    ...item,
    reviewer_name: item.name
  }));
}
async function loadApplicantAnswers(applicantId) {
  const result = await get('/api/v1/admin/recruitment/applicants/' + applicantId + '/answers');
  return (result && result.answers) || [];
}

function buildPlaceholderEvaluations(applicant) {
  const reviewers = ['평가자 1','평가자 2','평가자 3','평가자 4','평가자 5','평가자 6','평가자 7'];
  const decisions = ['pass','hold','fail','pass','pending','hold','pass'];
  return reviewers.map((name, idx) => {
    const seed = ((applicant.id || 0) + idx * 13) % 31;
    const decision = decisions[((applicant.id || 0) + idx) % decisions.length];
    return {
      reviewer_name: name,
      decision,
      score: decision === 'pending' ? null : Math.max(0, Math.min(100, 58 + seed + (decision === 'pass' ? 12 : decision === 'fail' ? -28 : 0))),
      memo: decision === 'pending' ? '' : 'API 연결 전 임시 표시입니다.',
    };
  });
}
function summarizeEvaluations(evaluations) {
  const done = evaluations.filter(ev => ev.decision && ev.decision !== 'pending');
  return {
    pass_count: done.filter(ev => ev.decision === 'pass').length,
    hold_count: done.filter(ev => ev.decision === 'hold').length,
    fail_count: done.filter(ev => ev.decision === 'fail').length,
    total_score: done.reduce((sum, ev) => sum + (Number(ev.score) || 0), 0),
  };
}
function normalizeRows(applicants) {
  return (applicants || []).map(a => {
    const personalEvaluation = a.personal_evaluation || a.eval || {};
    const myDecision = a.my_decision ?? a.mydecision ?? personalEvaluation.decision;

    return {
      ...a,
      submitted_at: a.submitted_at || a.created_at || a.updated_at,
      pass_count: Number(a.pass_count || 0),
      hold_count: Number(a.hold_count || 0),
      fail_count: Number(a.fail_count || 0),
      total_score: Number(a.total_score || 0),
      evaluator_evaluations: (a.evaluator_evaluations || a.evaluations || []).map(ev => ({
        ...ev,
        reviewer_name: ev.reviewer_name || ev.name,
        decision: fromApiDecision(ev.decision)
      })),
      personal_evaluation: {
        decision: fromApiDecision(myDecision),
        score: personalEvaluation.score ?? null,
        memo: personalEvaluation.memo || '',
        interview_question: personalEvaluation.interview_question || ''
      },
      final_evaluation: { decision: fromApiDecision(a.final_decision) },
    };
  });
}

async function init() {
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
  await loadRecruitments();
  await loadEvaluationDashboard();
}
async function loadRecruitments() {
  try {
    const recruitments = normalizeRecruitments(await get('/api/v1/admin/recruitment'));
    const sel = document.getElementById('sel-rec');
    sel.innerHTML = '<option value="">공고 선택</option>';

    recruitments.forEach(item => {
      const o = document.createElement('option');
      o.value = item.id;
      o.textContent = item.label;
      sel.appendChild(o);
    });

    if (recruitments.length > 0) {
      const active = recruitments.find(item => item.is_active) || recruitments[0];
      sel.value = active.id;
      S.filters.recruitment_id = String(active.id);
    }
  } catch(e) { console.warn('recruitments:', e); }
}
async function loadEvaluationDashboard() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="11" class="loading-cell">불러오는 중...</td></tr>';

  if (!S.filters.recruitment_id) {
    S.rows = [];
    render();
    return;
  }

  try {
    const applicants = await get(applicantListUrl(S.filters.recruitment_id));
    S.rows = normalizeRows(applicants);
    render();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="11" style="text-align:center;padding:40px;color:#ef4444">오류: ${esc(e.message)}</td></tr>`;
  }
}
function visibleRows() {
  const keyword = S.filters.search.trim().toLowerCase();
  let list = S.rows.slice();

  if (S.filters.track) {
    list = list.filter(r => r.track === S.filters.track);
  }
  if (S.filters.final_decision) {
    list = list.filter(r => (r.personal_evaluation?.decision || 'pending') === S.filters.final_decision);
  }
  if (keyword) {
    list = list.filter(r => [r.name, r.email, r.university, r.major]
      .some(value => String(value || '').toLowerCase().includes(keyword)));
  }

  const { sort, order } = S.filters;
  list.sort((a, b) => {
    let av = sort === 'name' ? (a.name || '') : Number(a[sort] || 0);
    let bv = sort === 'name' ? (b.name || '') : Number(b[sort] || 0);
    if (sort === 'name') return order === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return order === 'asc' ? av - bv : bv - av;
  });
  return list;
}
function render() {
  const list = visibleRows();
  document.getElementById('tbl-count').innerHTML = `총 <strong>${list.length}</strong>명`;
  document.getElementById('header-stats').innerHTML =
    `<div class="stat-chip total">전체 <strong>${S.rows.length}</strong>명</div>` +
    `<div class="stat-chip pass">합격 ${S.rows.reduce((s,r)=>s+r.pass_count,0)}</div>` +
    `<div class="stat-chip hold">보류 ${S.rows.reduce((s,r)=>s+r.hold_count,0)}</div>` +
    `<div class="stat-chip fail">불합 ${S.rows.reduce((s,r)=>s+r.fail_count,0)}</div>`;

  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state"><div class="icon">-</div><p>조건에 맞는 지원자가 없습니다</p><small>필터를 변경해보세요</small></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(a => `
    <tr class="${a.id === S.currentId ? 'selected' : ''}" onclick="openPanel(${a.id})">
      <td>
        <div class="applicant-name">${esc(a.name || '-')}</div>
        <div class="applicant-sub">${esc(a.email || '')}</div>
      </td>
      <td>${trackBadge(a.track)}</td>
      <td>
        <div class="univ-name">${esc(a.university || '-')}</div>
        <div class="major-name">${esc(a.major || '')}</div>
      </td>
      <td style="color:#64748b">${a.last_semester ? a.last_semester + '학기' : '-'}</td>
      <td style="color:#64748b;white-space:nowrap">${esc(a.graduation_date || '-')}</td>
      <td><span class="metric pass">${a.pass_count}</span></td>
      <td><span class="metric hold">${a.hold_count}</span></td>
      <td><span class="metric fail">${a.fail_count}</span></td>
      <td><strong>${a.total_score}</strong></td>
      <td>${decBadge(a.personal_evaluation?.decision)}</td>
      <td class="final-cell" onclick="event.stopPropagation()">${finalSelect(a)}</td>
    </tr>`).join('');
}

async function openPanel(id, preferredTab = 'app') {
  const row = S.rows.find(r => r.id === id);
  if (!row) return;
  S.currentId = id;
  S.currentData = row;
  S.tab = preferredTab;
  S.finalDraft = await loadMyEvaluation(id);
  row.personal_evaluation = { ...S.finalDraft };
  document.getElementById('overlay').classList.add('active');
  document.getElementById('panel').classList.add('open');
  document.getElementById('p-name').textContent = row.name || '-';
  const track = document.getElementById('p-track');
  track.className = `badge track-${['ANALYSIS','VISUALIZATION','ENGINEERING'].includes(row.track) ? row.track : '기타'}`;
  track.textContent = TRACK_LABEL[row.track] || row.track || '-';
  switchTab(preferredTab);
}
function closePanel() {
  S.currentId = null;
  S.currentData = null;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('panel').classList.remove('open');
  render();
}
async function refreshEvaluationDashboard() {
  const currentId = S.currentId;
  const currentTab = S.tab;
  const buttons = document.querySelectorAll('.panel-refresh');

  buttons.forEach(button => { button.disabled = true; });

  try {
    await loadEvaluationDashboard();

    if (!currentId) return;

    const row = S.rows.find(r => r.id === currentId);
    if (!row) {
      closePanel();
      return;
    }

    await openPanel(currentId, currentTab);
  } finally {
    buttons.forEach(button => { button.disabled = false; });
  }
}
function switchTab(tab) {
  S.tab = tab;
  document.getElementById('pt-app').classList.toggle('active', tab === 'app');
  document.getElementById('pt-final').classList.toggle('active', tab === 'final');
  document.getElementById('pt-status').classList.toggle('active', tab === 'status');
  document.getElementById('pt-interview').classList.toggle('active', tab === 'interview');
  renderPanelBody();
}
function moveApplicant(step) {
  const list = visibleRows();
  const idx = list.findIndex(row => row.id === S.currentId);
  if (idx === -1 || !list.length) return;
  const next = list[idx + step];
  if (!next) return;
  openPanel(next.id, S.tab);
  render();
}
async function renderPanelBody() {
  const el = document.getElementById('panel-body');
  const d = S.currentData;
  if (!d) return;
  if (S.tab === 'status') {
    el.innerHTML = '<div class="loading-cell">평가 현황을 불러오는 중...</div>';
    try {
      d.evaluator_evaluations = await loadEvaluatorEvaluations(d.id);
      el.innerHTML = buildStatusTab(d);
    } catch(e) {
      el.innerHTML = `<div style="color:#ef4444;padding:20px">오류: ${esc(e.message)}</div>`;
    }
  } else if (S.tab === 'interview') {
    el.innerHTML = '<div class="loading-cell">면접 질문을 불러오는 중...</div>';
    try {
      d.interview_questions = await loadApplicantInterviewQuestions(d.id);
      el.innerHTML = buildInterviewQuestionsTab(d);
    } catch(e) {
      el.innerHTML = `<div style="color:#ef4444;padding:20px">오류: ${esc(e.message)}</div>`;
    }
  } else if (S.tab === 'final') {
    el.innerHTML = '<div class="loading-cell">지원서와 개인 평가를 불러오는 중...</div>';
    try {
      d.answers = await loadApplicantAnswers(d.id);
      el.innerHTML = buildApplicationEvalSplit(d);
    } catch(e) {
      el.innerHTML = `<div style="color:#ef4444;padding:20px">오류: ${esc(e.message)}</div>`;
    }
  } else {
    el.innerHTML = '<div class="loading-cell">지원서 답변을 불러오는 중...</div>';
    try {
      d.answers = await loadApplicantAnswers(d.id);
      el.innerHTML = buildApplicationTab(d);
    } catch(e) {
      el.innerHTML = `<div style="color:#ef4444;padding:20px">오류: ${esc(e.message)}</div>`;
    }
  }
}
function buildStatusTab(d) {
  const rows = (d.evaluator_evaluations || []).slice().sort((a, b) => {
    const an = a.reviewer_name || a.evaluator_name || a.name || '';
    const bn = b.reviewer_name || b.evaluator_name || b.name || '';
    return an.localeCompare(bn, 'ko');
  });
  return `
    <div class="section">
      <div class="section-title">평가 현황</div>
      <div class="summary-grid">
        <div><span class="summary-label">합격</span><strong class="metric pass">${d.pass_count}</strong></div>
        <div><span class="summary-label">보류</span><strong class="metric hold">${d.hold_count}</strong></div>
        <div><span class="summary-label">불합</span><strong class="metric fail">${d.fail_count}</strong></div>
        <div><span class="summary-label">총점</span><strong>${d.total_score}</strong></div>
      </div>
      <table class="json-tbl eval-status-table">
        <thead><tr><th>평가자</th><th>평가</th><th>점수</th><th>메모</th></tr></thead>
        <tbody>
          ${rows.map(ev => `
            <tr>
              <td>${esc(ev.reviewer_name || ev.evaluator_name || '-')}</td>
              <td>${decBadge(ev.decision)}</td>
              <td>${ev.score ?? '-'}</td>
              <td>${esc(ev.memo || '')}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
function buildInterviewQuestionsTab(d) {
  const rows = (d.interview_questions || []).slice().sort((a, b) => {
    const an = a.reviewer_name || a.name || '';
    const bn = b.reviewer_name || b.name || '';
    return an.localeCompare(bn, 'ko');
  });

  return `
    <div class="section">
      <div class="section-title">면접 질문</div>
      <table class="json-tbl interview-question-table">
        <thead><tr><th>평가자</th><th>면접 질문</th></tr></thead>
        <tbody>
          ${rows.length ? rows.map(row => `
            <tr>
              <td>${esc(row.reviewer_name || row.name || '-')}</td>
              <td>${esc(row.interview_question || '') || '<span class="muted-cell">미작성</span>'}</td>
            </tr>`).join('') : '<tr><td colspan="2" class="muted-cell">면접 질문이 없습니다.</td></tr>'}
        </tbody>
      </table>
    </div>`;
}
function buildFinalTab() {
  const dr = S.finalDraft;
  const items = [
    ['pass','합격','sel-pass'],
    ['hold','보류','sel-hold'],
    ['fail','불합격','sel-fail'],
    ['pending','미결','sel-pending'],
  ];
  return `
    <div class="section">
      <div class="section-title">개인 평가 수정</div>
      <span class="eval-label">개인 결정</span>
      <div class="decision-grid">
        ${items.map(([v,label,cls]) => `<button class="dec-btn ${dr.decision === v ? cls : ''}" onclick="pickFinalDecision('${v}')">${label}</button>`).join('')}
      </div>
      <span class="eval-label">개인 점수</span>
      <div class="score-row">
        <input class="score-input" type="number" min="1" max="10" step="1" value="${dr.score ?? ''}" oninput="S.finalDraft.score = this.value ? Number(this.value) : null">
        <span class="score-suffix">/ 10점</span>
      </div>
      <span class="eval-label">메모</span>
      <textarea class="memo-area" oninput="S.finalDraft.memo = this.value" placeholder="개인 평가 메모">${esc(dr.memo || '')}</textarea>
      <span class="eval-label">면접 질문 제안</span>
      <textarea class="memo-area" oninput="S.finalDraft.interview_question = this.value" placeholder="면접에서 확인하고 싶은 질문을 입력하세요">${esc(dr.interview_question || '')}</textarea>
      <button class="save-btn" onclick="saveFinalEvaluation()">저장하기</button>
      <div class="save-msg" id="save-msg"></div>
    </div>`;
}
function buildApplicationEvalSplit(d) {
  return `
    <div class="app-eval-split">
      <div class="app-eval-doc">${buildApplicationTab(d)}</div>
      <aside class="app-eval-form">${buildFinalTab(d)}</aside>
    </div>`;
}
function buildApplicationTab(d) {
  const answers = d.answers || [];
  return `
    <div class="section">
      <div class="section-title">기본 정보</div>
      <div class="info-grid">
        <div class="info-item"><span class="info-lbl">이메일</span><span class="info-val">${esc(d.email || '-')}</span></div>
        <div class="info-item"><span class="info-lbl">전화번호</span><span class="info-val">${esc(d.phone || '-')}</span></div>
        <div class="info-item"><span class="info-lbl">대학교</span><span class="info-val">${esc(d.university || '-')}</span></div>
        <div class="info-item"><span class="info-lbl">전공</span><span class="info-val">${esc(d.major || '-')}</span></div>
        <div class="info-item"><span class="info-lbl">학기</span><span class="info-val">${d.last_semester ? d.last_semester + '학기' : '-'}</span></div>
        <div class="info-item"><span class="info-lbl">졸업 예정</span><span class="info-val">${esc(d.graduation_date || '-')}</span></div>
      </div>
    </div>
    <hr class="divider">
    <div class="section">
      <div class="section-title">지원 답변 (${answers.length}개)</div>
      ${answers.length ? answers.map(ans => {
        const label = ans.label || ans.q_label || `Q${ans.question_id}`;
        const content = ans.content || ans.q_content || '';
        const answer = ans.answer ?? ans.answer_text ?? ans.answer_json ?? '';
        return `
        <div class="answer-item">
          <div class="answer-qid">
            <span class="qid-tag">${esc(label)}</span>
            <span style="font-size:13px;color:#475569;font-weight:500">${esc(content)}</span>
          </div>
          ${renderAnswerValue(answer)}
        </div>`;
      }).join('') : '<p style="color:#94a3b8;font-size:13px">답변이 없습니다.</p>'}
    </div>`;
}

const FINAL_OPTIONS = ['pending','pass','hold','fail'];
function finalSelect(a) {
  const cur = a.final_evaluation?.decision || 'pending';
  const opts = FINAL_OPTIONS.map(v =>
    `<option value="${v}" ${v === cur ? 'selected' : ''}>${DEC_LABEL[v]}</option>`
  ).join('');
  return `<select class="final-select d-${cur}" onchange="changeFinal(${a.id}, this.value)">${opts}</select>`;
}
async function changeFinal(id, next) {
  const row = S.rows.find(r => r.id === id);
  if (!row) return;
  const prev = row.final_evaluation?.decision || 'pending';
  row.final_evaluation = { ...(row.final_evaluation || {}), decision: next };
  render();
  try {
    await patch('/api/v1/admin/recruitment/applicants/' + id + '/final-decision', {
      final_decision: toApiDecision(next)
    });
  } catch(e) {
    console.warn('최종 평가 저장 실패:', e);
    row.final_evaluation = { ...(row.final_evaluation || {}), decision: prev };
    render();
  }
}

function pickFinalDecision(v) {
  S.finalDraft.decision = v;
  renderPanelBody();
}
async function saveFinalEvaluation() {
  const msg = document.getElementById('save-msg');
  const row = S.rows.find(r => r.id === S.currentId);
  if (!row) return;

  const prevEvaluation = { ...(row.personal_evaluation || {}) };
  const prevMyDecision = row.my_decision ?? row.mydecision;
  const nextEvaluation = {
    ...S.finalDraft,
    decision: fromApiDecision(S.finalDraft.decision)
  };
  row.personal_evaluation = { ...nextEvaluation };
  row.my_decision = toApiDecision(nextEvaluation.decision);
  S.finalDraft = { ...nextEvaluation };
  render();

  try {
    const saved = await put('/api/v1/admin/recruitment/applicants/' + S.currentId + '/evaluations/me', {
      decision: toApiDecision(nextEvaluation.decision),
      score: nextEvaluation.score,
      memo: nextEvaluation.memo,
      interview_question: nextEvaluation.interview_question
    });

    row.personal_evaluation = saved ? { ...saved, decision: fromApiDecision(saved.decision) } : { ...nextEvaluation };
    row.my_decision = toApiDecision(row.personal_evaluation.decision);
    S.finalDraft = { ...row.personal_evaluation };
    msg.className = 'save-msg ok';
    msg.textContent = '저장되었습니다.';
    render();
  } catch(e) {
    row.personal_evaluation = { ...prevEvaluation };
    if (prevMyDecision === undefined) {
      delete row.my_decision;
    } else {
      row.my_decision = prevMyDecision;
    }
    S.finalDraft = { ...prevEvaluation };
    render();
    msg.className = 'save-msg err';
    msg.textContent = '저장 실패: ' + e.message;
  }
}

function onRecChange() {
  S.filters.recruitment_id = document.getElementById('sel-rec').value;
  loadEvaluationDashboard();
}
function setPill(type, btn, val) {
  const groupIds = { track:'track-pills', final_decision:'final-pills' };
  document.querySelectorAll(`#${groupIds[type]} .pill`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.filters[type] = val;
  render();
}
const onSearch = debounce(() => {
  S.filters.search = document.getElementById('search-input').value;
  render();
}, 280);
function onSortChange() {
  const [col, ord] = document.getElementById('sel-sort').value.split('|');
  S.filters.sort = col;
  S.filters.order = ord;
  render();
}

async function refreshAccessToken() {
  const refreshUrls = [
    '/api/v1/auth/admin/refresh'
  ];

  for (const path of refreshUrls) {
    try {
      const response = await fetch(apiUrl(path), {
        method: 'POST',
        credentials: 'include'
      });

      if (!response.ok) continue;

      const result = await response.json();
      const token =
        result?.data?.access_token ||
        result?.data?.accessToken ||
        result?.access_token ||
        result?.accessToken;

      if (token) {
        sessionStorage.setItem('access_token', token);
        return token;
      }
    } catch (error) {
      console.warn('refresh failed:', path, error);
    }
  }

  return null;
}

async function getCurrentAccount() {
  let token = sessionStorage.getItem('access_token');
  if (!token) token = await refreshAccessToken();
  if (!token) return null;

  const fallbackAccount = { username: '관리자' };

  let response = await fetch(apiUrl('/api/v1/admin/accounts/me'), {
    method: 'GET',
    credentials: 'include',
    headers: { Authorization: 'Bearer ' + token },
  });
  if (response.status === 401) {
    token = await refreshAccessToken();
    if (!token) return null;
    response = await fetch(apiUrl('/api/v1/admin/accounts/me'), {
      method: 'GET',
      credentials: 'include',
      headers: { Authorization: 'Bearer ' + token },
    });
  }
  if (!response.ok) return fallbackAccount;
  const result = await response.json();
  return result?.data || result?.user || result?.account || result || fallbackAccount;
}

async function logoutAdmin() {
  try {
    await fetch(apiUrl('/api/v1/auth/admin/logout'), {
      method: 'POST',
      credentials: 'include'
    });
  } catch (error) {
    console.warn('logout failed:', error);
  } finally {
    sessionStorage.removeItem('access_token');
    window.location.href = '/login.html';
  }
}

async function renderAuthStatus() {
  const box = document.getElementById('auth-status');
  if (!box) return;

  try {
    const account = await getCurrentAccount();
    if (!account) {
      box.className = 'auth-status signed-out';
      box.innerHTML = '<span class="auth-dot" aria-hidden="true"></span><a class="auth-status-link" id="auth-status-text" href="/login.html">로그인</a>';
      return;
    }
    box.className = 'auth-status signed-in';
    box.innerHTML = `<span class="auth-dot" aria-hidden="true"></span><span class="auth-status-link">${esc(account.name || account.username || account.team_name || '관리자')} 로그인됨</span><button class="auth-logout" type="button" onclick="logoutAdmin()">로그아웃</button>`;
  } catch (error) {
    box.className = 'auth-status signed-out';
    box.innerHTML = '<span class="auth-dot" aria-hidden="true"></span><a class="auth-status-link" id="auth-status-text" href="/login.html">로그인</a>';
  }
}

init();
renderAuthStatus();
</script>
