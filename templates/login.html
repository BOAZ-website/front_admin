<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <a class="login-back" href="/" aria-label="대시보드로 돌아가기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        대시보드
      </a>

      <div class="login-brand">
        <div class="login-logo" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#3b82f6"/>
            <path d="M8 9h12M8 14h12M8 19h7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>관리자 로그인</h1>
          <p>지원자 평가 대시보드</p>
        </div>
      </div>

      <form class="login-form" id="login-form">
        <label class="login-field">
          <span>아이디</span>
          <input type="text" name="username" autocomplete="username" placeholder="아이디를 입력하세요" required autofocus>
        </label>

        <label class="login-field">
          <span>비밀번호</span>
          <input type="password" name="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요" required>
        </label>

        <p class="login-error" id="login-error" role="alert" aria-live="polite"></p>
        <button class="login-submit" id="login-submit" type="submit">로그인</button>
      </form>

      <script>
        const form = document.getElementById('login-form');
        const submit = document.getElementById('login-submit');
        const errorBox = document.getElementById('login-error');

        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          errorBox.textContent = '';
          submit.disabled = true;
          submit.textContent = '로그인 중...';

          const formData = new FormData(form);
          try {
            const response = await fetch('/api/v1/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({
                username: formData.get('username'),
                password: formData.get('password'),
              }),
            });
            const result = await response.json();

            if (!response.ok) {
              errorBox.textContent = result?.error?.message || '로그인에 실패했습니다.';
              return;
            }

            sessionStorage.setItem('access_token', result.data.access_token);
            window.location.href = '/evaluations';
          } catch (error) {
            errorBox.textContent = '서버에 연결할 수 없습니다.';
          } finally {
            submit.disabled = false;
            submit.textContent = '로그인';
          }
        });
      </script>
    </section>
  </main>
</body>
</html>
