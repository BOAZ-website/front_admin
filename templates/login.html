<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인</title>

  <!-- S3 루트에 styles.css가 있으므로 /styles.css 사용 -->
  <link rel="stylesheet" href="/styles.css">

  <!-- favicon.ico 403 방지용 -->
  <link rel="icon" href="data:,">
</head>

<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
     

      <div class="login-brand">
        <div class="login-logo" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#3b82f6"/>
            <path d="M8 9h12M8 14h12M8 19h7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>관리자 로그인</h1>
          <p>지원자 평가 대시보드</p>
        </div>
      </div>

      <form class="login-form" id="login-form">
        <label class="login-field">
          <span>아이디</span>
          <input
            type="text"
            name="username"
            autocomplete="username"
            placeholder="아이디를 입력하세요"
            required
            autofocus
          >
        </label>

        <label class="login-field">
          <span>비밀번호</span>
          <input
            type="password"
            name="password"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
            required
          >
        </label>

        <p class="login-error" id="login-error" role="alert" aria-live="polite"></p>
        <button class="login-submit" id="login-submit" type="submit">로그인</button>
      </form>

      <script>
        const form = document.getElementById('login-form');
        const submit = document.getElementById('login-submit');
        const errorBox = document.getElementById('login-error');

        const LOGIN_API_URL = 'https://api.bigdataboaz.com/api/v1/auth/admin/login';

        form.addEventListener('submit', async (event) => {
          event.preventDefault();

          errorBox.textContent = '';
          submit.disabled = true;
          submit.textContent = '로그인 중...';

          const formData = new FormData(form);

          try {
            console.log('LOGIN API URL:', LOGIN_API_URL);

            const response = await fetch(LOGIN_API_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              credentials: 'include',
              body: JSON.stringify({
                username: formData.get('username'),
                password: formData.get('password')
              })
            });

            let result = null;

            try {
              result = await response.json();
            } catch (jsonError) {
              result = null;
            }

            console.log('LOGIN RESPONSE STATUS:', response.status);
            console.log('LOGIN RESPONSE BODY:', result);

            if (!response.ok) {
              errorBox.textContent =
                result?.error?.message ||
                result?.message ||
                '로그인에 실패했습니다.';
              return;
            }

            const accessToken =
              result?.data?.access_token ||
              result?.data?.accessToken ||
              result?.access_token ||
              result?.accessToken;

            if (accessToken) {
              sessionStorage.setItem('access_token', accessToken);
            }

            // S3에는 evaluations가 아니라 evaluations.html이 있으므로 .html로 이동
            window.location.href = '/evaluations.html';

          } catch (error) {
            console.error('LOGIN ERROR:', error);
            errorBox.textContent = '서버에 연결할 수 없습니다.';
          } finally {
            submit.disabled = false;
            submit.textContent = '로그인';
          }
        });
      </script>
    </section>
  </main>
</body>
</html>
